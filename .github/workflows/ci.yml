name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check server/ pipeline/ core/ throttle/ cli/

      - name: Format (black)
        run: black --check server/ pipeline/ core/ throttle/ cli/ tests/

      - name: Type check (mypy)
        run: mypy server/ pipeline/ core/ throttle/ cli/ --ignore-missing-imports

      - name: Test (pytest)
        run: pytest -v -m "not integration"
